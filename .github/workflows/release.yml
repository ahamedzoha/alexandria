name: Release

# Publishes a DMG to a GitHub Release whenever you push a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the release

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Alexandria uses macOS 26 SDK APIs (glassEffect, gated behind #available),
      # so the build needs Xcode 26+. `latest-stable` picks the newest Xcode on
      # the runner; if that toolchain is still older than 26 the build will fail
      # to compile the glass code — until GitHub ships a macOS 26 image, cut
      # releases with `Scripts/package.sh` on your Mac instead.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build DMG
        run: Scripts/package.sh "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
